<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller Formularios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Taller Práctico</h1>

<h2>Ejercicio 1</h2>
<form method="POST">
    Nombre: <input type="text" name="nombre"><br><br>
    Correo: <input type="email" name="correo"><br><br>
    Contraseña: <input type="password" name="password"><br><br>
    <input type="submit" value="Enviar">
</form>

<hr>

<h2>Ejercicio 2</h2>
<form method="GET">
    Nombre: <input type="text" name="nombre"><br><br>
    Ciudad: <input type="text" name="ciudad"><br><br>
    <input type="submit" value="Enviar">
</form>

<hr>

<h2>Ejercicio 3 - Autocomplete ON</h2>
<form autocomplete="on">
    Nombre: <input type="text" name="nombre"><br><br>
    Correo: <input type="email" name="correo"><br><br>
    Teléfono: <input type="tel" name="telefono"><br><br>
    <input type="submit" value="Enviar">
</form>

<h2>Autocomplete OFF</h2>
<form autocomplete="off">
    Nombre: <input type="text" name="nombre"><br><br>
    Correo: <input type="email" name="correo"><br><br>
    Teléfono: <input type="tel" name="telefono"><br><br>
    <input type="submit" value="Enviar">
</form>

<hr>
